<!DOCTYPE html>
<html>
<head>
	<meta charsset="utf-8">
	<title>The Whiteboard</title>
	<link rel="stylesheet" href="css/bootstrap.min.css">
	<link href="//netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap-glyphicons.css" rel="stylesheet">
</head>
<body>
	<script src="jquery-3.3.1.min.js"></script>
	<script src="js/bootstrap.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.4.1/js/bootstrap-datepicker.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.4.1/css/bootstrap-datepicker3.css"/>
	
	<script src="js/login.js"></script>
	<script src="js/projects/projects.js"></script>
	<script src="js/dateFunctions.js"></script>
	
	<div class="col-sm-12">
		<div class="jumbotron info">
			<h1 text="center">Whiteboard</h1>This time you won't stain your hands
		</div>
	</div>
	<!-- Start Top Menu portion -->
	
	<div id="topMenu">
		<div class="col-lg-12">
			<ul class="nav nav-tabs" role="tablist">
				<li class="nav-item">
					<a class="nav-link" id="home-tab" data-toggle="tab" role="tab" aria-control="home" href="index.html">Home</a>
				</li>
				<li class="nav-item">
					<a class="nav-link active" id="project-tab" data-toggle="tab" role="tab" aria-control="project" href="projects.html">Projects</a>
				</li>
				<li class="nav-item">
					<a class="nav-link " id="task-tab" data-toggle="tab" role="tab" aria-control="task" href="tasks.html">Tasks</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" id="team-tab" data-toggle="tab" role="tab" aria-control="team" href="teams.html">Teams</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" id="sprint-tab" data-toggle="tab" role="tab" aria-control="sprint" href="sprints.html">Sprints</a>
				</li>		
				<li class="nav-item">
					<a class="nav-link" id="performance-tab" data-toggle="tab" role="tab" aria-control="performance" href="performance.html">Performance</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" id="user-tab" data-toggle="tab" role="tab" aria-control="user" href="user.html">User Preferences</a>
				</li>
			</ul>		
		</div>
	</div>
	
	<!-- End Top Menu portion -->
	
	<div class="row">&nbsp;</div>
	<div class="col-lg-4">
		<button type="button" class="btn btn-success" id="addProjectBtn">
			<span class="glyphicon glyphicon-plus"></span>&nbsp;Add Project
		</button>
	</div>			
	<div class="row">&nbsp;</div>
	<div class="col-lg-8">
		<table class="table" id="projectTable">
			<thead>
				<tr>
					<th scope="col">Projects</th>
					<th scope="col">Action</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>
	</div>		
</body>

<!-- Add Project Modal Section -->

<div class="modal fade" id="addProjectModal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header d-block alert-success">
				<div class="row">
					<div class="col-lg-2">&nbsp;</div>
					<div class="col-lg-8">
						<h5 class="modal-title text-center">Add Project</h5>
					</div>
					<div class="col-lg-2">
						<button type="button" class="close" data-dismiss="modal" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
				</div>
			</div>
			<div class="modal-body">
				
				<div class="row">
					<div class="col-sm-6 text-right">Project Name</div>
					<div class="col-sm-6"><input id="addProjName"></div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-3 text-right">Description</div>
					<div class="col-sm-8">
						<div class="form-group">
							<textarea class="form-control" rows="4" id="addProjDescription"></textarea>
						</div>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-6 text-right">Start Date</div>
					<div class="col-sm-4">
						<div class="form-group">
							<div class="input-group date" id="addProjStart">
								<input type="text" class="form-control"/>
								<span class="input-group-addon">
									<span class="glyphicon glyphicon-calendar"></span>
								</span>
							</div>
						</div>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-6 text-right">End Date</div>
					<div class="col-sm-4">
						<div class="form-group">
							<div class="input-group date" id="addProjEnd">	
								<input type="text" class="form-control"/>							
								<span class="input-group-addon">
									<span class="glyphicon glyphicon-calendar" ></span>
								</span>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-success" id="pushProjectToDB">
					<span class="glyphicon glyphicon-cloud-upload"></span>&nbsp;Add Project
				</button>&nbsp;
				<button type="button" class="btn btn-outline-secondary" id="cancelAddProjectBtn" data-dimiss="modal">
					<span class="glyphicon glyphicon-ban-circle"></span>&nbsp;Cancel
				</button>
			</div>
		</div>
	</div>
</div>

<!-- Edit Project Modal Section -->

<div class="modal fade" id="editProjectModal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header d-block alert-warning">
				<div class="row">
					<div class="col-lg-2">&nbsp;</div>
					<div class="col-lg-8">
						<h5 class="modal-title text-center">Edit Project</h5>
					</div>
					<div class="col-lg-2">
						<button type="button" class="close" data-dismiss="modal" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
				</div>
			</div>
			<div class="modal-body">
				
				<div class="row">
					<input type="hidden" id="editProjIdHdn">
					<div class="col-sm-6 text-right">Project Name</div>
					<div class="col-sm-6"><input id="editProjName"></div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-3 text-right">Description</div>
					<div class="col-sm-8">
						<div class="form-group">
							<textarea class="form-control" rows="4" id="editProjDescription"></textarea>
						</div>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-6 text-right">Start Date</div>
					<div class="col-sm-4">
						<div class="form-group">
							<div class="input-group date" id="editProjStart">	
								<input type="text" class="form-control"/>							
								<span class="input-group-addon">
									<span class="glyphicon glyphicon-calendar" ></span>
								</span>
							</div>
						</div>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-6 text-right">End Date</div>
					<div class="col-sm-4">
						<div class="form-group">
							<div class="input-group date" id="editProjEnd">	
								<input type="text" class="form-control"/>							
								<span class="input-group-addon">
									<span class="glyphicon glyphicon-calendar" ></span>
								</span>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-warning" id="pushEditProjectToDB">
					<span class="glyphicon glyphicon-cloud-upload"></span>&nbsp;Update Project
				</button>&nbsp;
				<button type="button" class="btn btn-outline-secondary" id="cancelEditProjectBtn" data-dismiss="modal">
					<span class="glyphicon glyphicon-ban-circle"></span>&nbsp;Cancel
				</button>
			</div>
		</div>
	</div>
</div>

</html>
