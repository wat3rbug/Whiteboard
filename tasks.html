<!DOCTYPE html>
<html>
<head>
	<meta charsset="utf-8">
	<title>The Whiteboard</title>
	<link rel="stylesheet" href="css/bootstrap.min.css">
	<link href="//netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap-glyphicons.css" rel="stylesheet">
</head>
<body>
	<script src="jquery-3.3.1.min.js"></script>
	<script src="js/bootstrap.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.4.1/js/bootstrap-datepicker.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.4.1/css/bootstrap-datepicker3.css"/>
	
	<script src="js/signup.js"></script>
	<script src="js/tasks/tasks.js"></script>
	<script src="js/dateFunctions.js"></script>
	
	<div class="col-sm-12">
		<div class="jumbotron info">
			<h1 text="center">Whiteboard</h1>This time we won't stain your hands
		</div>
	</div>
	<!-- Start Top Menu portion -->
	
	<div id="topMenu">
		<ul class="nav nav-tabs" role="tablist">
			<li class="nav-item">
				<a class="nav-link" id="home-tab" data-toggle="tab" role="tab" aria-control="home" href="index.html">Home</a>
			</li>
			<li class="nav-item">
				<a class="nav-link" id="project-tab" data-toggle="tab" role="tab" aria-control="project" href="projects.html">Projects</a>
			</li>
			<li class="nav-item">
				<a class="nav-link active" id="task-tab" data-toggle="tab" role="tab" aria-control="task" href="tasks.html">Tasks</a>
			</li>
			<li class="nav-item">
				<a class="nav-link" id="team-tab" data-toggle="tab" role="tab" aria-control="team" href="teams.html">Teams</a>
			</li>
			<li class="nav-item">
				<a class="nav-link" id="sprint-tab" data-toggle="tab" role="tab" aria-control="sprint" href="sprints.html">Sprints</a>
			</li>
		</ul>
		
	</div>
	
	<!-- End Top Menu portion -->
	
	<div class="row">&nbsp;</div>
	<div class="row">
		<div class="col-sm-10">
			<button type="button" class="btn btn-success" id="addTaskBtn">
				<span class="glyphicon glyphicon-plus"></span>
				Add Task
			</button>
			<div class="row">&nbsp;</div>
			<table class="table" id="tasksTable">
				<thead>
					<tr>
						<th scope="col">Tasks</th>
						<th scope="col">Action</th>
					</tr>
				</thead>
				<tbody>
				</tbody>
			</table>
		</div>
	</div>
</div>
</body>


<!-- Add Task Modal Section -->

<div class="modal fade" id="addTaskModal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header d-block alert-success">
				<h5 class="modal-title text-center">Add Task</h5>
			</div>
			<div class="modal-body">
				
				<div class="row">
					<div class="col-sm-6 text-right">Project</div>
					<div class="col-sm-6">
						<select class="browser-default custom-select" id="addProjSelector">
						</select>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-6 text-right">Difficulty</div>
					<div class="col-sm-2">
						<select class="browser-default custom-select" id="addDiffSelector">
							<option values="1">1</option>
							<option values="2">2</option>
							<option values="3">3</option>
							<option values="5">5</option>
							<option values="8">8</option>
							<option values="13">13</option>
							<option values="21">21</option>
						</select>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-3 text-right">Subject</div>
					<div class="col-sm-8">
						<div class="form-group">
							<textarea class="form-control" rows="1" id="addSubject"></textarea>
						</div>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-3 text-right">Description</div>
					<div class="col-sm-8">
						<div class="form-group">
							<textarea class="form-control" rows="4" id="addDescription"></textarea>
						</div>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-success" id="pushTaskToDB">
					<span class="glyphicon glyphicon-cloud-upload"></span>&nbsp;Add Task
				</button>&nbsp;
				<button type="button" class="btn btn-outline-secondary" id="cancelAddTaskBtn">
					<span class="glyphicon glyphicon-ban-circle"></span>&nbsp;Cancel
				</button>
			</div>
		</div>
	</div>
</div>


<!-- Edit Task Modal Section -->

<div class="modal fade" id="editTaskModal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header d-block alert-success">
				<h5 class="modal-title text-center">Edit Task</h5>
			</div>
			<div class="modal-body">
				
				<div class="row">
					<input type="hidden" id="taskIdHdn">
					<div class="col-sm-6 text-right">Project</div>
					<div class="col-sm-6">
						<select class="browser-default custom-select" id="editProjSelector">
						</select>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-6 text-right">Difficulty</div>
					<div class="col-sm-2">
						<select class="browser-default custom-select" id="editDiffSelector">
							<option values="1">1</option>
							<option values="2">2</option>
							<option values="3">3</option>
							<option values="5">5</option>
							<option values="8">8</option>
							<option values="13">13</option>
							<option values="21">21</option>
						</select>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-3 text-right">Subject</div>
					<div class="col-sm-8">
						<div class="form-group">
							<textarea class="form-control" rows="1" id="editSubject"></textarea>
						</div>
					</div>
				</div>
				<div class="row">&nbsp;</div>
				<div class="row">
					<div class="col-sm-3 text-right">Description</div>
					<div class="col-sm-8">
						<div class="form-group">
							<textarea class="form-control" rows="4" id="editDescription"></textarea>
						</div>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-warning" id="pushEditTaskToDB">
					<span class="glyphicon glyphicon-cloud-upload"></span>&nbsp;Edit Task
				</button>&nbsp;
				<button type="button" class="btn btn-outline-secondary" id="cancelEditTaskBtn">
					<span class="glyphicon glyphicon-ban-circle"></span>&nbsp;Cancel
				</button>
			</div>
		</div>
	</div>
</div>
</html>
